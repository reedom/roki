[package]
name = "roki-daemon"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "roki daemon: Linear-driven, per-issue agent orchestrator"

[[bin]]
name = "roki"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
axum = { version = "0.7", default-features = false, features = ["http1", "json", "tokio"] }
clap = { version = "4.5", features = ["derive"] }
dirs = "5"
hex = "0.4"
hmac = "0.12"
jsonschema = { version = "0.46", default-features = false }
liquid = "0.26"
notify = "8"
notify-debouncer-mini = { version = "0.6", default-features = false }
regex = { version = "1.10", default-features = false, features = ["std", "perf"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10"
thiserror = "2.0"
time = { version = "0.3", default-features = false, features = ["std", "formatting"] }
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "sync", "time"] }
toml = "0.8"
tower = { version = "0.5", default-features = false }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1.10", features = ["v4"] }

[dev-dependencies]
tempfile = "3.10"
tower = { version = "0.5", default-features = false, features = ["util"] }
tracing-test = { version = "0.2", features = ["no-env-filter"] }
wiremock = "0.6"

[lints]
workspace = true
