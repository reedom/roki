# Annotated reference: every key in roki.toml, with comments
# Schema canonical: docs/reference/config.md
# Minimal working: docs/examples/roki.minimal.toml
#
# Source-value notation:
#   { env  = "VAR_NAME" }            — read from an environment variable
#   { file = "/path/to/secret" }     — read from a file (newline trimmed)
#   "literal-value"                   — written inline (not recommended)
#
# Note: orchestrator session A's model / effort / max_phases / allowed_tools
# are NOT configured here. They live under the reserved `extension.orchestrator.*`
# namespace in WORKFLOW.md (hot-reloadable). The legacy [judge] block is
# removed alongside the setup-judge subprocess shape; both admission
# classification and daemon-only Linear writes are now performed by orchestrator
# session A. See docs/fr/19-orchestrator-session.md.

# ============================================================
# [linear] — Linear access (required)
# ============================================================
[linear]
# Where to fetch the API token from. Refuses startup if it cannot be resolved
api_token = { env = "LINEAR_API_TOKEN" }
# Alternative: api_token = { file = "/etc/roki/linear-token" }

# Where to fetch the webhook HMAC secret from
webhook_secret = { env = "LINEAR_WEBHOOK_SECRET" }

# Assignee subject to admission
# Specifying "me" resolves to the API token holder
# Refuses startup if unresolvable / multiple resolutions
assignee = "me"
# Alternative: assignee = "user-uuid-or-email"

# Set of Linear workflow state names to admit (optional)
# default: ["Todo"]
# Refuses startup on empty set
admit_states = ["Todo"]
# Example: admit_states = ["Todo", "Backlog"]

# ============================================================
# [workflow] — WORKFLOW.md path (required)
# ============================================================
[workflow]
# Refuses startup if missing / unreadable
path = "./WORKFLOW.md"

# ============================================================
# [server] — Webhook receiver bind (optional, can be overridden via CLI)
# ============================================================
[server]
bind = "127.0.0.1"   # CLI: --bind <addr>
port = 8080          # CLI: --port <num>

# ============================================================
# [[repos]] — Allowlist (0+, ghq identifiers)
# ============================================================
# Refuses startup on duplicates
# Booting with an empty allowlist is fine, but any `act` admission decision A
# returns will then fail allowlist validation and route the issue to
# Inactive(reason=allowlist_rejected).

[[repos]]
ghq = "github.com/your-org/repo-a"

[[repos]]
ghq = "github.com/your-org/repo-b"

# ============================================================
# [permissions] — Phase subprocess permission strategy (required)
# ============================================================
# Applies to phase subprocesses only. Orchestrator session A always runs with a
# read-only filesystem sandbox and rejected elicitations regardless of this
# setting; A's tool surface is governed exclusively by
# extension.orchestrator.allowed_tools in WORKFLOW.md.
[permissions]
# "settings-allowlist": via Claude Code's --settings allowlist (recommended)
# "dangerously-skip":   pinned to --dangerously-skip-permissions
#                        (fallback for when the allowlist cannot be trusted)
strategy = "settings-allowlist"
# Can be overridden at runtime via the --dangerously-skip-permissions CLI flag
