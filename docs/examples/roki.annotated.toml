# Annotated reference: every key in roki.toml, with comments
# Schema canonical: docs/reference/config.md
# Minimal working: docs/examples/roki.minimal.toml
#
# Source-value notation:
#   { env  = "VAR_NAME" }            — read from an environment variable
#   { file = "/path/to/secret" }     — read from a file (newline trimmed)
#   "literal-value"                  — written inline (not recommended for secrets)
#
# roki.toml is NOT hot-reloaded; changes require a daemon restart.
# WORKFLOW.yaml + workflow/*.md are restart-only in slice 8 (hot reload deferred).

# ============================================================
# [linear] — Linear access (required)
# ============================================================
[linear]
# Where to fetch the API token from. Refuses startup if it cannot be resolved
token = { env = "LINEAR_API_TOKEN" }
# Alternative: token = { file = "/etc/roki/linear-token" }

# Polling fallback cadence (seconds). Default 300, validation min 60.
# Polling is activated by webhook outage detection or by POST /api/refresh
# (refresh nudge); it is not the primary path. Webhook delivery is mandatory.
polling.cadence_seconds = 300

# ============================================================
# [linear.webhook] — Webhook receiver (required, internet-facing)
# ============================================================
# Linear cloud must be able to reach this bind. Keep it separate from the
# observability HTTP API ([api]) so the read-only surface is not co-located
# with the public ingress.
[linear.webhook]
secret = { env = "LINEAR_WEBHOOK_SECRET" }
bind = "0.0.0.0"
port = 9090

# ============================================================
# [api] — Observability HTTP API (optional, loopback default)
# ============================================================
# Read-only consumer surface for roki-tui and `roki events`. The server does
# not start when port is omitted (an `api_disabled` info log is emitted).
[api]
bind = "127.0.0.1"   # default 127.0.0.1; non-loopback emits a warn log noting absent auth
port = 8080          # omit to disable the API

# ============================================================
# [default.ai.session] — Default session-shape cli (required)
# ============================================================
# Used when a workflow phase declares `session = "session"` (or inline `prompt`)
# without a per-file `cli` override. Long-lived AI subprocess reused across all
# pre / post invocations of one cycle. The daemon does not parse the cli line.
[default.ai.session]
cli = "claude --input-format stream-json --output-format stream-json --model claude-opus-4-7"
stall_seconds = 600   # default 600

# ============================================================
# [default.ai.command] — Default command-shape cli (required)
# ============================================================
# Used when a workflow phase declares `session = "command"` (or inline `cmd`)
# without a per-file `cli` override. Fresh subprocess per invocation.
[default.ai.command]
cli = "claude -p --output-format stream-json --max-turns 100"
stall_seconds = 300   # default 300

# ============================================================
# [engine] — Cycle engine knobs
# ============================================================
[engine]
# Cap on state visits across a cycle. When a state's visit count exceeds its
# `max_visits`, the daemon refuses the next visit and routes the cycle through
# `on_failure: when.kind = recursion_bound` (or directly to the escalation
# queue for failure cycles that themselves recurse). Pass 5 of sugar
# expansion auto-injects this default on SCC entry nodes that declare none.
max_iterations = 10   # default 10

# ============================================================
# [paths] — Filesystem layout (required)
# ============================================================
[paths]
# WORKFLOW.yaml location. Restart-only in slice 8.
workflow = "./WORKFLOW.yaml"

# Per-ticket session tempdir + per-iter capture root. Used by the daemon for
# log capture only; never used as a phase subprocess cwd.
session_root = "~/.cache/roki/sessions"

# Worktree paths are owned by worktrunk (see ~/.config/worktrunk/config.toml).
# The daemon does not configure or enumerate worktree directories itself.

# ============================================================
# [log] — Structured event log destination
# ============================================================
[log]
# stdout (default) | file | both
destination = "stdout"

# Required when destination ∈ {file, both}
file_path = "/var/log/roki/daemon.jsonl"

# error | warn | info (default) | debug | trace
# Overridable via CLI: --log-level <level>
level = "info"

# In-memory ring buffer size (events). Backs the HTTP API live tail.
ring_size = 1000   # default 1000
