# Annotated reference: every element of WORKFLOW.toml, with comments
# Schema canonical: docs/reference/config.md
# Engine contract: docs/fr/01-engine-model.md
# Minimal working: docs/examples/WORKFLOW.minimal.toml
#
# This file is hot-reloaded. workflow/*.md files referenced from `*.path`
# are also hot-reloaded.
#
# Evaluation order on every Linear diff:
#   1. [[admission.repos]] first-match → resolves ticket to a repo (sticky)
#   2. [[cleanup]] first-match (if any matches, runs as a cleanup cycle and
#      auto-deletes worktree + session_tempdir on completion)
#   3. [[rule]] first-match
# Failures route through [[on_failure]] first-match independently.

# ============================================================
# [admission] — Coarse webhook filter (required, single block)
# ============================================================
[admission]
# Linear assignee to admit. "me" resolves to the API token holder.
# Refuses startup if the resolution fails.
assignee = "me"

# ============================================================
# [[admission.repos]] — Repo allowlist + dispatch (required, 1+ entries)
# ============================================================
# First-match. Ordered. when.* is optional — entries without when.* act as a
# fallback for tickets matching no other repo entry. Resolution runs once per
# cache entry at first admission; the resolved repo and workflow path are
# sticky for the lifetime of the cache entry.

# Per-repo TOML override: this entry's [[rule]] / [[cleanup]] / [[on_failure]]
# are read from the named file instead of the top-level lists below. Top-level
# admission stays in WORKFLOW.toml.
[[admission.repos]]
ghq = "github.com/your-org/repo-bar"
when.labels.has_any = ["repo:bar"]
workflow = "repos/bar.toml"

# Title regex matcher for repo discrimination
[[admission.repos]]
ghq = "github.com/your-org/repo-baz"
when.title.regex = "^\\[baz\\]"

# Title prefix matcher (admission.repos only)
[[admission.repos]]
ghq = "github.com/your-org/repo-frontend"
when.title.starts_with = "[ui]"

# Title / body substring matcher (admission.repos only)
[[admission.repos]]
ghq = "github.com/your-org/repo-infra"
when.title.contains = "infra"
when.body.contains = "deployment"

# Fallback (no when.*): catches tickets that match no other repo entry
[[admission.repos]]
ghq = "github.com/your-org/repo-default"

# ============================================================
# [[rule]] — Cycle-spawning rules (0+, ordered, first-match)
# ============================================================
# A matched rule starts a `rule`-kind cycle. `run` is required; `pre` and
# `post` are optional. Phase block declares exactly one of:
#   path = "<file>"          → file-form (workflow/*.md)
#   prompt = "<inline str>"  → inline session-form (uses [default.ai.session].cli)
#   cmd = "<inline str>"     → inline command-form (operator-authored cli line)

# Inline session-form pre + path-form run + inline session-form post
[[rule]]
when.status = "Todo"
when.labels.has_all = ["roki:ready"]
pre.prompt = """
You are the pre-phase for ticket {{ ticket.id }} ({{ ticket.title }}).
Inspect the ticket. If actionable, output `{"directive":"run"}`. Otherwise
output `{"directive":"end","outcome":"no_action"}`.
"""
run.path = "workflow/impl.md"
post.prompt = """
You are the post-phase. Read run exit code: {{ run.exit_code }}.
If non-zero and cycle.iter < config.max_iterations, output `{"directive":"run"}`
to retry. Otherwise output `{"directive":"end","outcome":"success"}` (or
"failure" on bad exit).
"""

# Path-form for all three phases (per-file frontmatter chooses session vs command)
[[rule]]
when.status = "InProgress"
when.labels.has_all = ["roki:ready"]
when.labels.has_none = ["roki:blocked"]
pre.path = "workflow/judge.md"
run.path = "workflow/impl.md"
post.path = "workflow/verdict.md"

# Negation (scalar fields), rule-level assignee + repo matchers
# (assignee is also gated coarsely by [admission].assignee; the rule-level
#  matcher refines further. repo is the admission-resolved ghq path, useful
#  when the same WORKFLOW.toml dispatches multiple repos via repo-discriminating
#  rules.)
# `when.<field>.not` works on scalar fields (status / assignee / repo / kind /
#  phase). For label list negation use `when.labels.has_none = [...]`.
[[rule]]
when.status.not = "Done"
when.assignee = "me"
when.repo = "github.com/your-org/repo-bar"
when.labels.has_any = ["roki:experimental"]
when.labels.has_none = ["roki:hold"]
run.cmd = "claude -p --output-format stream-json --max-turns 50"

# ============================================================
# [[cleanup]] — Cleanup-cycle rules (0+, ordered, first-match)
# ============================================================
# Evaluated before [[rule]] on every diff. A matched cleanup runs as a
# `cleanup`-kind cycle, then the daemon deletes worktree + session_tempdir
# and evicts the ticket from the cache.

# Cleanup with phases — runs ceremony before delete
[[cleanup]]
when.status.in = ["Done", "Cancelled"]
pre.prompt = """
Final ceremony. Post a Linear comment via Linear MCP summarizing the cycle.
Output `{"directive":"run"}`.
"""
run.cmd = "claude -p 'post final summary' --output-format stream-json --max-turns 5"
post.prompt = "Output `{\"directive\":\"end\"}`"

# Cleanup shorthand: all three phases omitted → immediate-delete (no cycle).
# Used when no Linear ceremony is needed.
[[cleanup]]
when.labels.has_none = ["roki:ready"]

# ============================================================
# [[on_failure]] — Failure-handler rules (0+, ordered, first-match)
# ============================================================
# Triggered when a cycle hits an internal failure. The matched entry runs as
# a `failure`-kind cycle with `{{ failure.* }}` populated. A failure cycle
# that itself fails does NOT chain into another failure cycle — recursive
# failures land in the escalation queue.

# `when.kind` matches a daemon-detected failure kind; `when.phase` matches
# the phase that emitted the failure (always concrete: pre / run / post).
#
# Legal failure kinds:
#   process_crash   subprocess SIGSEGV / non-zero exit without parseable terminal
#   unparseable     last JSON object on stdout failed to parse / `directive` missing
#   schema_drift    `directive` value outside the legal set for the phase
#   fs_poison       worktree / session-tempdir setup error before phase launch
#   stall           stall window exceeded; daemon SIGTERMed the subprocess
#   iter_exhausted  post directive requested another iter past max_iterations
#   template_error  Liquid render of cli line / phase body failed before launch
# Full table: docs/fr/01-engine-model.md §Failure handling
[[on_failure]]
when.kind.in = ["unparseable", "schema_drift"]
run.cmd = "claude -p '/post-mortem {{ failure.failed_cycle_id }}' --output-format stream-json"
post.prompt = "Output `{\"directive\":\"end\"}`"

# Match on phase
[[on_failure]]
when.kind = "stall"
when.phase = "run"
run.prompt = """
The run phase stalled. Read failed cycle's logs:
  roki log --cycle {{ failure.failed_cycle_id }} --phase run --stream stderr --tail 100
Diagnose, write a Linear comment, output `{"directive":"end","outcome":"stall_handled"}`.
"""

# Catch-all (no when.*) — any failure not matched above lands here
[[on_failure]]
run.prompt = """
Unexpected failure: {{ failure.kind }} in {{ failure.phase }}.
Failed cycle: {{ failure.failed_cycle_id }}. Read its logs and write Linear feedback.
Output `{"directive":"end","outcome":"failure_logged"}`.
"""

# ============================================================
# Recognized fields and condition vocabulary
# ============================================================
# Fields:
#   status / labels / assignee — Linear ticket state
#   repo                       — admission-resolved ghq path (rule-level only)
#   kind / phase               — failure context (on_failure only)
#   title / body               — Linear ticket strings (admission.repos only)
#
# Operators (each entry's when.* keys AND together; OR by writing more entries):
#   when.<field> = "<scalar>"            — equality
#   when.<field>.not = "<scalar>"        — negation
#   when.<field>.in = [...]              — set membership
#   when.labels.has_all = [...]
#   when.labels.has_any = [...]
#   when.labels.has_none = [...]
#   when.title.regex = "..."             — admission.repos only
#   when.title.starts_with = "..."       — admission.repos only
#   when.title.contains = "..."          — admission.repos only
#   when.body.contains = "..."           — admission.repos only
#
# Liquid template variables exposed to phase bodies and cli lines:
#   {{ ticket.id }} {{ ticket.title }} {{ ticket.body }} {{ ticket.labels }}
#   {{ ticket.assignee }} {{ ticket.status }}
#   {{ repo.ghq }}
#   {{ cycle.id }} {{ cycle.kind }} {{ cycle.trigger }} {{ cycle.iter }}
#   {{ config.max_iterations }}
#   {{ pre.* }} {{ post.* }}                      (most recent iter; ROKI_PRE_*/ROKI_POST_* env for top-level scalars)
#   {{ run.exit_code }} {{ run.duration_seconds }} {{ run.terminal.* }}
#   {{ failure.kind }} {{ failure.failed_cycle_id }} {{ failure.phase }}
#   {{ failure.iter }} {{ failure.exit_code }} {{ failure.error_text }}
#
# Full table: docs/fr/01-engine-model.md §Inter-phase data flow

# ============================================================
# Per-repo TOML override (referenced via [[admission.repos]] workflow = "...")
# ============================================================
# When [[admission.repos]] sets `workflow = "<path>"`, that file replaces this
# repo's [[rule]] / [[cleanup]] / [[on_failure]] lists entirely. Top-level
# admission stays in WORKFLOW.toml.
#
# Schema is identical to the top-level WORKFLOW.toml minus the [admission]
# block (admission lives only at the top level). A minimal per-repo TOML:
#
#   # repos/bar.toml
#   [[rule]]
#   when.status = "Todo"
#   when.labels.has_all = ["roki:ready"]
#   run.path = "../workflow/impl-bar.md"
#
#   [[cleanup]]
#   when.status.in = ["Done", "Cancelled"]
#   # all phases omitted → immediate-delete
