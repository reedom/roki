# Minimal WORKFLOW.toml — smallest configuration that boots
# Annotated reference: docs/examples/WORKFLOW.annotated.toml
# Schema canonical: docs/reference/config.md
# Engine contract: docs/fr/01-engine-model.md

[admission]
# Linear assignee to admit. "me" resolves to the API token holder.
assignee = "me"

# At least one [[admission.repos]] entry is required so a ticket has a repo
# to dispatch to. The daemon resolves [[admission.repos]] first-match per
# cache entry at first admission; the resolved repo is sticky for the
# lifetime of the cache entry.
[[admission.repos]]
ghq = "github.com/your-org/your-repo"

# One [[rule]] entry. when.* keys AND together; OR via more entries.
# `run` is required for any cycle-spawning entry; `pre` and `post` are optional.
[[rule]]
when.status = "Todo"
when.labels.has_all = ["roki:ready"]
run.cmd = "claude -p --output-format stream-json --max-turns 100"
